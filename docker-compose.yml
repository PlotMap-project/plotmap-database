version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: plotmap-postgres
    environment:
      POSTGRES_USER: plotmap
      POSTGRES_PASSWORD: plotmap_dev
      POSTGRES_DB: plotmap
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plotmap"]
      interval: 5s
      timeout: 5s
      retries: 5

  flyway:
    image: flyway/flyway:10
    container_name: plotmap-flyway
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./postgresql/migrations:/flyway/sql
    command:
      - migrate
      - -url=jdbc:postgresql://postgres:5432/plotmap
      - -user=plotmap
      - -password=plotmap_dev

  neo4j:
    image: neo4j:5
    container_name: plotmap-neo4j
    environment:
      NEO4J_AUTH: neo4j/plotmap_dev
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

volumes:
  postgres_data:
  neo4j_data:
